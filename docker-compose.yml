services:
  candle-feeder:
    build: .
    container_name: candle-feeder
    restart: always
    extra_hosts:
      - "host.docker.internal:172.17.0.1"  # Docker host IP for bridge access
    volumes:
      - /home/claude_dev/hive-bot/data/cache/mt5_cache:/data/cache/mt5_cache
    ports:
      - "8085:8080"    # Health endpoint
    environment:
      # MT5 EA bridges on the host (priority order: freshest data first)
      - BRIDGE_URLS=http://host.docker.internal:5005,http://host.docker.internal:5006,http://host.docker.internal:5007,http://host.docker.internal:5003
      # TwelveData keys for history backfill (optional)
      - TWELVEDATA_KEYS=${TWELVEDATA_KEYS:-}
      # Redis for new-bar pub/sub (optional)
      - REDIS_URL=redis://candle-redis:6379
      # Cache config
      - CACHE_DIR=/data/cache/mt5_cache
      - MAX_CANDLES=${MAX_CANDLES:-50000}
      - POLL_INTERVAL=${POLL_INTERVAL:-10}
      - CANDLES_PER_POLL=${CANDLES_PER_POLL:-500}
      - BOOTSTRAP_THRESHOLD=${BOOTSTRAP_THRESHOLD:-10000}
    depends_on:
      - candle-redis
    networks:
      - candle-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  candle-redis:
    image: redis:7-alpine
    container_name: candle-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - candle-net

volumes:
  redis-data:

networks:
  candle-net:
    driver: bridge
