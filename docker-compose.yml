services:
  # Dedicated OANDA demo MT5 terminal — data extraction only, no trading
  mt5-oanda:
    image: gmag11/metatrader5_vnc
    container_name: mt5-oanda
    restart: always
    volumes:
      - mt5_oanda_config:/config
    ports:
      - "3001:3000"    # VNC browser UI
      - "5008:4905"    # Candle bridge API
    environment:
      - CUSTOM_USER=${MT5_VNC_USER:-admin}
      - PASSWORD=${MT5_VNC_PASSWORD:-100%Secured}
    networks:
      - candle-net

  candle-feeder:
    build: .
    container_name: candle-feeder
    restart: always
    extra_hosts:
      - "host.docker.internal:172.17.0.1"  # Docker host IP for bridge access
    volumes:
      - /home/claude_dev/hive-bot/data/cache/mt5_cache:/data/cache/mt5_cache
    ports:
      - "8085:8080"    # Health endpoint
    environment:
      # OANDA dedicated candle bridge is PRIMARY, trading bridges as fallback
      - BRIDGE_URLS=http://mt5-oanda:4905,http://host.docker.internal:5003,http://host.docker.internal:5005,http://host.docker.internal:5006,http://host.docker.internal:5007
      # TwelveData keys for history backfill (optional)
      - TWELVEDATA_KEYS=${TWELVEDATA_KEYS:-}
      # Redis for new-bar pub/sub (optional)
      - REDIS_URL=redis://candle-redis:6379
      # SigNoz OTel Collector
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://signoz-otel-collector:4318
      # Cache config
      - CACHE_DIR=/data/cache/mt5_cache
      - MAX_CANDLES=${MAX_CANDLES:-50000}
      - POLL_INTERVAL=${POLL_INTERVAL:-10}
      - CANDLES_PER_POLL=${CANDLES_PER_POLL:-500}
      - BOOTSTRAP_THRESHOLD=${BOOTSTRAP_THRESHOLD:-10000}
    depends_on:
      - mt5-oanda
      - candle-redis
    networks:
      - candle-net
      - signoz-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  candle-redis:
    image: redis:7-alpine
    container_name: candle-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - candle-net

volumes:
  mt5_oanda_config:   # Persists OANDA MT5 login across restarts
  redis-data:

networks:
  candle-net:
    driver: bridge
  signoz-net:
    external: true
    name: signoz-net
